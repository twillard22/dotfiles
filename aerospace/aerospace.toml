# Automatically move focus to the window that appears under the mouse
start-at-login = true
on-focus-changed = ['move-mouse window-lazy-center']

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
# floating because tiling causes new tabs to shrink the window
run = ['move-node-to-workspace G', 'layout floating']

[[on-window-detected]]
if.app-name-regex-substring = 'Code'
run = ['move-node-to-workspace V', 'layout accordion']

[[on-window-detected]]
if.app-name-regex-substring = 'Google Chrome'
run = ['move-node-to-workspace C', 'layout accordion']

[gaps]
inner.horizontal = 4
inner.vertical   = 4
outer.left       = 4
outer.right      = 4
outer.top        = 4
outer.bottom     = 4

[mode.main.binding]
# Focus windows with Alt+hjkl
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows with Alt+Shift+hjkl
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize with Alt+Ctrl+hjkl
alt-ctrl-h = 'resize width -50'
alt-ctrl-l = 'resize width +50'
alt-ctrl-k = 'resize height -50'
alt-ctrl-j = 'resize height +50'

# Layouts
alt-slash      = 'layout tiles horizontal vertical'
alt-shift-slash = 'layout accordion horizontal vertical'

# Fullscreen toggle
alt-f = 'fullscreen'

# Float/tile toggle (useful for apps that don't play well with tiling)
alt-shift-f = 'layout floating tiling'

# Switch workspaces with Alt+1-9
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-v = 'workspace V'
alt-c = 'workspace C'
alt-g = 'workspace G'

# Move window to workspace with Alt+Shift+1-9
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'

# Move window to next/prev monitor
alt-shift-tab = 'move-node-to-monitor next'

# Reload config
alt-shift-semicolon = 'reload-config'
